        <!-- ===== BOTTOM NAV ===== -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="youtube"><i class="fab fa-youtube"></i> YouTube</button>
            <button class="nav-btn" data-tab="local"><i class="fas fa-folder-open"></i> Local</button>
            <button class="nav-btn" data-tab="playlist"><i class="fas fa-list"></i> Playlist</button>
            <button class="nav-btn" data-tab="history"><i class="fas fa-history"></i> History</button>
            <button class="nav-btn" data-tab="downloads"><i class="fas fa-download"></i> Downloads</button>
            <button class="nav-btn" data-tab="settings"><i class="fas fa-cog"></i> Settings</button>
        </nav>

    </div>

    <!-- ================================================================ -->
    <!-- ===== JAVASCRIPT ===== -->
    <!-- ================================================================ -->
    <script>
        (function() {
            'use strict';

            // ----- DOM refs -----
            const appWrapper = document.getElementById('appWrapper');
            const urlInput = document.getElementById('urlInput');
            const loadBtn = document.getElementById('loadBtn');
            const fileInput = document.getElementById('fileInput');
            const galleryBtn = document.getElementById('galleryBtn');
            const videoWrapper = document.getElementById('videoWrapper');
            const placeholder = document.getElementById('placeholder');
            const seekFill = document.getElementById('seekFill');
            const seekContainer = document.getElementById('seekContainer');
            const seekTooltip = document.getElementById('seekTooltip');
            const tooltipTime = document.getElementById('tooltipTime');
            const timeDisplay = document.getElementById('timeDisplay');
            const playBtn = document.getElementById('playBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const rewindBtn = document.getElementById('rewindBtn');
            const forwardBtn = document.getElementById('forwardBtn');
            const volSlider = document.getElementById('volSlider');
            const volIcon = document.getElementById('volIcon');
            const speedDisplay = document.getElementById('speedDisplay');
            const speedDropdown = document.getElementById('speedDropdown');
            const speedSelector = document.getElementById('speedSelector');
            const speedGrid = document.getElementById('speedGrid');
            const audioToggle = document.getElementById('audioToggle');
            const audioModeBtn = document.getElementById('audioModeBtn');
            const audioOverlay = document.getElementById('audioOverlay');
            const audioTitle = document.getElementById('audioTitle');
            const audioSubtitle = document.getElementById('audioSubtitle');
            const albumArt = document.getElementById('albumArt');
            const audioProgress = document.getElementById('audioProgress');
            const audioProgressFill = document.getElementById('audioProgressFill');
            const audioTime = document.getElementById('audioTime');
            const audioPlay = document.getElementById('audioPlay');
            const audioPrev = document.getElementById('audioPrev');
            const audioNext = document.getElementById('audioNext');
            const audioShuffle = document.getElementById('audioShuffle');
            const audioRepeat = document.getElementById('audioRepeat');
            const audioSleep = document.getElementById('audioSleep');
            const historyList = document.getElementById('historyList');
            const fsBtn = document.getElementById('fsBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const pipBtn = document.getElementById('pipBtn');
            const themeBtn = document.getElementById('themeBtn');
            const settingsBtn = document.getElementById('settingsBtn');
            const libraryBtn = document.getElementById('libraryBtn');
            const subtitleBtn = document.getElementById('subtitleBtn');
            const historyBtn = document.getElementById('historyBtn');
            const favoritesBtn = document.getElementById('favoritesBtn');
            const playlistBtn = document.getElementById('playlistBtn');
            const settingsMenuBtn = document.getElementById('settingsMenuBtn');
            const settingsMenu = document.getElementById('settingsMenu');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const repeatBtn = document.getElementById('repeatBtn');
            const controlBar = document.getElementById('controlBar');
            const toastContainer = document.getElementById('toastContainer');
            const navBtns = document.querySelectorAll('.nav-btn');

            // ----- State -----
            let player = null;
            let currentMode = 'none';
            let isPlaying = false;
            let currentSpeed = 1.0;
            let audioMode = false;
            let history = [];
            let videoElement = null;
            let isFullscreen = false;
            let isShuffle = false;
            let repeatMode = 0;
            let controlsTimer = null;
            let isControlsVisible = true;
            let isSeeking = false;
            let isYouTube = false;
            let isPipActive = false;
            let currentTitle = '';
            let currentSrc = '';
            let sleepTimer = null;

            // ----- Toast -----
            function showToast(msg, icon = 'fa-check-circle') {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
                toastContainer.appendChild(toast);
                setTimeout(() => {
                    toast.classList.add('toast-out');
                    setTimeout(() => toast.remove(), 300);
                }, 2800);
            }

            // ----- History -----
            function addHistory(title, type, src) {
                const entry = { title, type, src, time: Date.now() };
                history.unshift(entry);
                if (history.length > 20) history.pop();
                try { localStorage.setItem('playerHistory', JSON.stringify(history)); } catch (e) {}
                renderHistory();
            }

            function renderHistory() {
                if (!historyList) return;
                if (history.length === 0) {
                    historyList.innerHTML =
                        '<div style="text-align:center;color:rgba(255,255,255,0.06);font-size:0.6rem;padding:14px 0;">No history yet</div>';
                    return;
                }
                let html = '';
                history.slice(0, 10).forEach(item => {
                    const icon = item.type === 'youtube' ? 'fab fa-youtube' : 'fas fa-film';
                    html += `
                        <div class="history-item" data-src="${item.src}" data-type="${item.type}">
                            <div class="thumb"><i class="${icon}"></i></div>
                            <div class="info">
                                <div class="title">${item.title || 'Untitled'}</div>
                                <div class="duration">${item.type === 'youtube' ? 'YouTube' : 'Local'}</div>
                            </div>
                            <span class="play-icon"><i class="fas fa-play-circle"></i></span>
                        </div>
                    `;
                });
                historyList.innerHTML = html;
                historyList.querySelectorAll('.history-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const src = this.dataset.src;
                        const type = this.dataset.type;
                        if (type === 'youtube') loadYouTube(src);
                        else loadLocal(src);
                    });
                });
            }

            try {
                const saved = localStorage.getItem('playerHistory');
                if (saved) { history = JSON.parse(saved);
                    renderHistory(); }
            } catch (e) {}

            // ================================================================
            // MEDIA SESSION API – lock screen controls
            // ================================================================
            function updateMediaSession(title, artist = 'Raftar se😎', artwork = null) {
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: title || 'Raftar se😎',
                        artist: artist,
                        album: 'Video Player',
                        artwork: artwork ? [{ src: artwork, sizes: '512x512', type: 'image/jpeg' }] : []
                    });

                    navigator.mediaSession.setActionHandler('play', () => playBtn.click());
                    navigator.mediaSession.setActionHandler('pause', () => playBtn.click());
                    navigator.mediaSession.setActionHandler('seekbackward', (details) => {
                        if (currentMode === 'local' && videoElement) {
                            videoElement.currentTime = Math.max(0, videoElement.currentTime - (details.seekOffset ||
                                10));
                        } else if (currentMode === 'youtube' && player && player.seekTo) {
                            player.seekTo(Math.max(0, player.getCurrentTime() - (details.seekOffset || 10)), true);
                        }
                    });
                    navigator.mediaSession.setActionHandler('seekforward', (details) => {
                        if (currentMode === 'local' && videoElement) {
                            videoElement.currentTime = Math.min(videoElement.duration || 0, videoElement.currentTime +
                                (details.seekOffset || 10));
                        } else if (currentMode === 'youtube' && player && player.seekTo) {
                            const dur = player.getDuration();
                            player.seekTo(Math.min(dur, player.getCurrentTime() + (details.seekOffset || 10)), true);
                        }
                    });
                    navigator.mediaSession.setActionHandler('previoustrack', () => prevBtn.click());
                    navigator.mediaSession.setActionHandler('nexttrack', () => nextBtn.click());
                    navigator.mediaSession.setActionHandler('seekto', (details) => {
                        if (details.seekTime !== undefined) {
                            if (currentMode === 'local' && videoElement) {
                                videoElement.currentTime = details.seekTime;
                            } else if (currentMode === 'youtube' && player && player.seekTo) {
                                player.seekTo(details.seekTime, true);
                            }
                        }
                    });
                }
            }

            // ================================================================
            // CONTROL BAR AUTO-HIDE
            // ================================================================
            function showControls() {
                controlBar.classList.remove('hidden');
                isControlsVisible = true;
                resetControlsTimer();
            }

            function hideControls() {
                if (isPlaying && !isSeeking && !audioMode) {
                    controlBar.classList.add('hidden');
                    isControlsVisible = false;
                }
            }

            function resetControlsTimer() {
                if (controlsTimer) clearTimeout(controlsTimer);
                controlsTimer = setTimeout(hideControls, 3500);
            }

            // Video wrapper click toggles controls and play/pause
            videoWrapper.addEventListener('click', function(e) {
                if (e.target.closest('.control-bar') || e.target.closest('button') ||
                    e.target.closest('.toggle-switch') || e.target.closest('.speed-selector') ||
                    e.target.closest('.settings-menu') || e.target.closest('.audio-overlay')) return;
                if (currentMode !== 'none') {
                    playBtn.click();
                }
                showControls();
            });

            videoWrapper.addEventListener('mousemove', function(e) {
                if (e.target.closest('.control-bar')) return;
                showControls();
            });

            videoWrapper.addEventListener('touchstart', function(e) {
                if (e.target.closest('.control-bar')) return;
                showControls();
            });

            controlBar.addEventListener('mouseenter', function() {
                if (controlsTimer) clearTimeout(controlsTimer);
                controlBar.classList.remove('hidden');
                isControlsVisible = true;
            });
            controlBar.addEventListener('mouseleave', function() {
                if (isPlaying && !audioMode) resetControlsTimer();
            });

            // ================================================================
            // CREATE VIDEO ELEMENT
            // ================================================================
            function createVideoElement() {
                if (videoElement) { videoElement.remove();
                    videoElement = null; }
                videoElement = document.createElement('video');
                videoElement.setAttribute('playsinline', '');
                videoElement.setAttribute('preload', 'metadata');
                videoElement.style.width = '100%';
                videoElement.style.height = '100%';
                videoElement.style.objectFit = 'contain';
                videoElement.style.background = '#08080f';
                const ph = placeholder;
                if (ph) ph.style.display = 'none';
                videoWrapper.appendChild(videoElement);
                setupVideoEvents();
                return videoElement;
            }

            function setupVideoEvents() {
                if (!videoElement) return;
                videoElement.addEventListener('timeupdate', updateProgress);
                videoElement.addEventListener('loadedmetadata', function() {
                    updateProgress();
                    const saved = parseFloat(localStorage.getItem('preferredSpeed'));
                    if (saved && saved >= 0.25 && saved <= 10) setSpeed(saved);
                    showControls();
                    // Update audio overlay
                    if (audioMode) {
                        updateAudioUI();
                    }
                });
                videoElement.addEventListener('play', () => {
                    isPlaying = true;
                    updatePlayBtn();
                    resetControlsTimer();
                    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
                    if (audioMode) updateAudioUI();
                });
                videoElement.addEventListener('pause', () => {
                    isPlaying = false;
                    updatePlayBtn();
                    showControls();
                    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
                    if (audioMode) updateAudioUI();
                });
                videoElement.addEventListener('volumechange', updateVolumeIcon);
                videoElement.addEventListener('ended', () => {
                    isPlaying = false;
                    updatePlayBtn();
                    if (repeatMode === 2) {
                        videoElement.currentTime = 0;
                        videoElement.play().catch(() => {});
                    }
                    if (audioMode) updateAudioUI();
                });
                videoElement.addEventListener('enterpictureinpicture', () => { isPipActive = true; });
                videoElement.addEventListener('leavepictureinpicture', () => { isPipActive = false; });
                setInterval(() => {
                    if (currentMode === 'local' && videoElement && videoElement.src && videoElement.duration) {
                        try {
                            localStorage.setItem('resume_' + encodeURIComponent(videoElement.src), videoElement
                                .currentTime.toString());
                        } catch (e) {}
                    }
                }, 3000);
            }

            // ================================================================
            // PROGRESS & UI UPDATES
            // ================================================================
            function updateProgress() {
                let current = 0,
                    duration = 0;
                if (currentMode === 'local' && videoElement) {
                    current = videoElement.currentTime || 0;
                    duration = videoElement.duration || 0;
                } else if (currentMode === 'youtube' && player && player.getCurrentTime) {
                    current = player.getCurrentTime() || 0;
                    duration = player.getDuration() || 0;
                }
                if (duration && duration > 0) {
                    const pct = (current / duration) * 100;
                    seekFill.style.width = `${pct}%`;
                    timeDisplay.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
                    // Update audio overlay
                    if (audioMode) {
                        audioProgressFill.style.width = `${pct}%`;
                        audioTime.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
                    }
                }
            }

            function formatTime(sec) {
                if (!sec || isNaN(sec)) return '0:00';
                const h = Math.floor(sec / 3600);
                const m = Math.floor((sec % 3600) / 60);
                const s = Math.floor(sec % 60);
                if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                return `${m}:${String(s).padStart(2,'0')}`;
            }

            function updatePlayBtn() {
                const icon = isPlaying ? 'fa-pause' : 'fa-play';
                playBtn.innerHTML = `<i class="fas ${icon}"></i>`;
                audioPlay.innerHTML = `<i class="fas ${icon}"></i>`;
                // Update Media Session
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
                }
            }

            function updateVolumeIcon() {
                let vol = parseFloat(volSlider.value);
                if (currentMode === 'local' && videoElement) vol = videoElement.volume;
                else if (currentMode === 'youtube' && player && typeof player.getVolume === 'function') vol = player
                    .getVolume() / 100;
                if (vol === 0) volIcon.className = 'fas fa-volume-mute';
                else if (vol < 0.5) volIcon.className = 'fas fa-volume-down';
                else volIcon.className = 'fas fa-volume-up';
            }

            function updateAudioUI() {
                if (!audioMode) return;
                let duration = 0,
                    current = 0;
                if (currentMode === 'local' && videoElement) {
                    duration = videoElement.duration || 0;
                    current = videoElement.currentTime || 0;
                } else if (currentMode === 'youtube' && player && player.getDuration) {
                    duration = player.getDuration() || 0;
                    current = player.getCurrentTime() || 0;
                }
                if (duration) {
                    const pct = (current / duration) * 100;
                    audioProgressFill.style.width = `${pct}%`;
                    audioTime.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
                }
                audioTitle.textContent = currentTitle || 'Audio Mode';
                audioSubtitle.textContent = isPlaying ? '▶️ Playing' : '⏸️ Paused';
                audioPlay.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
            }

            // ================================================================
            // SET SPEED (syncs all controls)
            // ================================================================
            function setSpeed(val) {
                val = Math.min(10, Math.max(0.25, parseFloat(val)));
                currentSpeed = val;
                if (currentMode === 'local' && videoElement) {
                    videoElement.playbackRate = val;
                } else if (currentMode === 'youtube' && player && typeof player.setPlaybackRate === 'function') {
                    player.setPlaybackRate(val);
                }
                speedDisplay.innerHTML =
                    `${val.toFixed(2)}x <i class="fas fa-chevron-down" style="font-size:0.45rem;margin-left:2px;"></i>`;
                speedDropdown.querySelectorAll('.speed-option').forEach(opt => {
                    const sp = parseFloat(opt.dataset.speed);
                    opt.classList.toggle('active', Math.abs(sp - val) < 0.01);
                });
                speedGrid.querySelectorAll('.speed-btn').forEach(btn => {
                    const sp = parseFloat(btn.dataset.speed);
                    btn.classList.toggle('active', Math.abs(sp - val) < 0.01);
                });
                try { localStorage.setItem('preferredSpeed', val); } catch (e) {}
            }

            // ================================================================
            // SEEK
            // ================================================================
            seekContainer.addEventListener('mousemove', function(e) {
                const rect = this.getBoundingClientRect();
                const pct = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
                const tooltip = seekTooltip;
                tooltip.style.left = `${pct * 100}%`;
                let duration = 0;
                if (currentMode === 'local' && videoElement) duration = videoElement.duration || 0;
                else if (currentMode === 'youtube' && player && player.getDuration) duration = player.getDuration() ||
                0;
                if (duration) {
                    const time = pct * duration;
                    tooltipTime.textContent = formatTime(time);
                    tooltip.classList.add('visible');
                }
            });

            seekContainer.addEventListener('mouseleave', function() {
                seekTooltip.classList.remove('visible');
            });

            seekContainer.addEventListener('mousedown', function(e) {
                isSeeking = true;
                const rect = this.getBoundingClientRect();
                const pct = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
                seekTo(pct);
                showControls();
            });

            window.addEventListener('mousemove', function(e) {
                if (isSeeking) {
                    const rect = seekContainer.getBoundingClientRect();
                    const pct = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
                    seekTo(pct);
                }
            });

            window.addEventListener('mouseup', function() {
                if (isSeeking) {
                    isSeeking = false;
                    resetControlsTimer();
                }
            });

            function seekTo(pct) {
                let duration = 0;
                if (currentMode === 'local' && videoElement) duration = videoElement.duration || 0;
                else if (currentMode === 'youtube' && player && player.getDuration) duration = player.getDuration() ||
                0;
                if (duration) {
                    const time = pct * duration;
                    if (currentMode === 'local' && videoElement) videoElement.currentTime = time;
                    else if (currentMode === 'youtube' && player && player.seekTo) player.seekTo(time, true);
                    seekFill.style.width = `${pct * 100}%`;
                    timeDisplay.textContent = `${formatTime(time)} / ${formatTime(duration)}`;
                    if (audioMode) {
                        audioProgressFill.style.width = `${pct * 100}%`;
                        audioTime.textContent = `${formatTime(time)} / ${formatTime(duration)}`;
                    }
                }
            }

            // Touch support for seek
            let touchSeekActive = false;
            seekContainer.addEventListener('touchstart', function(e) {
                e.preventDefault();
                isSeeking = true;
                touchSeekActive = true;
                const touch = e.touches[0];
                const rect = this.getBoundingClientRect();
                const pct = Math.min(1, Math.max(0, (touch.clientX - rect.left) / rect.width));
                seekTo(pct);
                showControls();
            });

            seekContainer.addEventListener('touchmove', function(e) {
                e.preventDefault();
                if (touchSeekActive) {
                    const touch = e.touches[0];
                    const rect = this.getBoundingClientRect();
                    const pct = Math.min(1, Math.max(0, (touch.clientX - rect.left) / rect.width));
                    seekTo(pct);
                }
            });

            seekContainer.addEventListener('touchend', function(e) {
                e.preventDefault();
                isSeeking = false;
                touchSeekActive = false;
                resetControlsTimer();
            });

            // ================================================================
            // FULLSCREEN + ORIENTATION
            // ================================================================
            async function enterFullscreen() {
                try {
                    if (appWrapper.requestFullscreen) {
                        await appWrapper.requestFullscreen();
                    } else if (appWrapper.webkitRequestFullscreen) {
                        await appWrapper.webkitRequestFullscreen();
                    } else {
                        showToast('Fullscreen not supported', 'fa-exclamation-circle');
                        return;
                    }
                    isFullscreen = true;
                    try {
                        if (screen.orientation && screen.orientation.lock) {
                            await screen.orientation.lock('landscape');
                            showToast('⛶ Fullscreen + Landscape', 'fa-expand');
                        } else {
                            showToast('⛶ Fullscreen ON', 'fa-expand');
                        }
                    } catch (orientErr) {
                        showToast('⛶ Fullscreen ON', 'fa-expand');
                    }
                } catch (err) {
                    console.warn('Fullscreen error:', err);
                    showToast('Fullscreen failed', 'fa-exclamation-circle');
                }
            }

            async function exitFullscreen() {
                try {
                    if (document.fullscreenElement) {
                        await document.exitFullscreen();
                    } else if (document.webkitFullscreenElement) {
                        await document.webkitExitFullscreen();
                    }
                    isFullscreen = false;
                    try {
                        if (screen.orientation && screen.orientation.unlock) {
                            screen.orientation.unlock();
                            try { await screen.orientation.lock('portrait'); } catch (e) { /* ignore */ }
                        }
                    } catch (orientErr) { /* ignore */ }
                    showToast('⛶ Fullscreen OFF', 'fa-compress');
                } catch (err) {
                    console.warn('Exit fullscreen error:', err);
                }
            }

            function toggleFullscreen() {
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    exitFullscreen();
                } else {
                    enterFullscreen();
                }
            }

            document.addEventListener('fullscreenchange', handleFullscreenChange);
            document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

            function handleFullscreenChange() {
                const isNowFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
                if (!isNowFullscreen && isFullscreen) {
                    isFullscreen = false;
                    try {
                        if (screen.orientation && screen.orientation.unlock) {
                            screen.orientation.unlock();
                            setTimeout(() => { try { screen.orientation.lock('portrait'); } catch (e) { /* ignore */ } },
                            300);
                        }
                    } catch (e) { /* ignore */ }
                }
                showControls();
            }

            // ================================================================
            // LOAD YOUTUBE (official IFrame API)
            // ================================================================
            function loadYouTube(url) {
                const videoId = extractVideoId(url);
                if (!videoId) { showToast('Invalid YouTube URL', 'fa-exclamation-circle'); return; }
                if (videoElement) { videoElement.remove();
                    videoElement = null; }
                const existingIframe = videoWrapper.querySelector('iframe');
                if (existingIframe) existingIframe.remove();
                if (player) { player.destroy();
                    player = null; }

                currentMode = 'youtube';
                isYouTube = true;
                placeholder.style.display = 'none';
                // Exit audio mode if active
                if (audioMode) toggleAudioMode();

                const container = document.createElement('div');
                container.id = 'youtube-player-container';
                container.style.width = '100%';
                container.style.height = '100%';
                videoWrapper.appendChild(container);

                if (typeof YT === 'undefined' || !YT.Player) {
                    showToast('Loading YouTube API...', 'fa-spinner fa-spin');
                    const checkYT = setInterval(() => {
                        if (typeof YT !== 'undefined' && YT.Player) {
                            clearInterval(checkYT);
                            createYTPlayer(videoId, container);
                        }
                    }, 300);
                    return;
                }
                createYTPlayer(videoId, container);
            }

            function createYTPlayer(videoId, container) {
                player = new YT.Player(container, {
                    height: '100%',
                    width: '100%',
                    videoId: videoId,
                    playerVars: { controls: 0, modestbranding: 1, rel: 0, fs: 0, autoplay: 1 },
                    events: {
                        onReady: function() {
                            isPlaying = true;
                            updatePlayBtn();
                            currentMode = 'youtube';
                            const data = player.getVideoData();
                            const title = data.title || 'YouTube Video';
                            currentTitle = title;
                            document.title = '🎬 ' + title;
                            audioTitle.textContent = title;
                            audioSubtitle.textContent = '▶️ Playing';
                            showToast('▶️ ' + title, 'fa-play');
                            addHistory(title, 'youtube', `https://youtu.be/${videoId}`);
                            const saved = parseFloat(localStorage.getItem('preferredSpeed'));
                            if (saved && saved >= 0.25 && saved <= 10) setSpeed(saved);
                            updateMediaSession(title);
                            showControls();
                            const ytInterval = setInterval(() => {
                                if (currentMode === 'youtube' && player && player.getCurrentTime) {
                                    updateProgress();
                                    if (audioMode) updateAudioUI();
                                } else {
                                    clearInterval(ytInterval);
                                }
                            }, 500);
                        },
                        onStateChange: function(event) {
                            if (event.data === YT.PlayerState.PLAYING) { isPlaying = true;
                                updatePlayBtn();
                                resetControlsTimer(); } else if (event.data === YT.PlayerState.PAUSED) { isPlaying =
                                    false;
                                updatePlayBtn();
                                showControls(); } else if (event.data === YT.PlayerState.ENDED) { isPlaying = false;
                                updatePlayBtn(); }
                            updateProgress();
                            if (audioMode) updateAudioUI();
                            if ('mediaSession' in navigator) {
                                navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
                            }
                        },
                        onError: function(event) {
                            showToast('YouTube error: ' + event.data, 'fa-exclamation-triangle');
                        }
                    }
                });
            }

            function extractVideoId(url) {
                const match = url.match(
                    /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
                return match ? match[1] : null;
            }

            // ================================================================
            // LOAD LOCAL
            // ================================================================
            function loadLocal(src, title) {
                const existingIframe = videoWrapper.querySelector('iframe');
                if (existingIframe) existingIframe.remove();
                if (player) { player.destroy();
                    player = null; }
                const vid = createVideoElement();
                vid.src = src;
                vid.load();
                currentMode = 'local';
                isYouTube = false;
                placeholder.style.display = 'none';
                currentTitle = title || 'Local Video';
                document.title = '🎬 ' + currentTitle;
                audioTitle.textContent = currentTitle;
                audioSubtitle.textContent = '▶️ Playing';
                // Set album art
                albumArt.innerHTML = '<i class="fas fa-film"></i>';
                if (title) {
                    albumArt.innerHTML = `<span style="font-size:0.8rem;color:rgba(255,255,255,0.2);">${title.substring(0,2).toUpperCase()}</span>`;
                }
                try {
                    const key = 'resume_' + encodeURIComponent(src);
                    const saved = parseFloat(localStorage.getItem(key));
                    if (saved && saved > 0) {
                        vid.addEventListener('loadedmetadata', function onMeta() {
                            vid.currentTime = Math.min(saved, vid.duration - 1);
                            vid.removeEventListener('loadedmetadata', onMeta);
                        });
                    }
                } catch (e) {}
                vid.play().catch(() => {});
                addHistory(title || 'Local Video', 'local', src);
                updateMediaSession(title || 'Local Video');
                showToast('▶️ ' + (title || 'Local video'), 'fa-play');
                showControls();
                if (audioMode) {
                    videoWrapper.classList.add('audio-mode');
                    audioOverlay.classList.add('active');
                    updateAudioUI();
                }
            }

            function loadMedia(input) {
                if (!input) return;
                if (/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)/.test(input)) {
                    loadYouTube(input);
                } else {

            // ================================================================
            // PARTICLES BACKGROUND
            // ================================================================
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let w, h;

            function resizeCanvas() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.speedY = (Math.random() - 0.5) * 0.3;
                    this.opacity = Math.random() * 0.3 + 0.1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > w) this.speedX *= -1;
                    if (this.y < 0 || this.y > h) this.speedY *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(139, 92, 246, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 80; i++) particles.push(new Particle());

            function animateParticles() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update();
                    p.draw(); });
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(139, 92, 246, ${0.04 * (1 - dist/120)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // ================================================================
            // INIT
            // ================================================================
            showToast('🚀 Raftar se😎 ready!', 'fa-bolt');
            try {
                const saved = parseFloat(localStorage.getItem('preferredSpeed'));
                if (saved && saved >= 0.25 && saved <= 10) setSpeed(saved);
            } catch (e) {}

            showControls();
            console.log('🚀 Raftar se😎 Premium Player with full portrait controls loaded!');

        })();
    </script>

</body>
