<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Raftar se😎 · Premium Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        /* ============================================================
           RESET & GLOBAL – premium dark theme, mobile-first
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #6d28d9;
            --primary-light: #c4b5fd;
            --primary-glow: rgba(139, 92, 246, 0.3);
            --accent-blue: #60a5fa;
            --accent-cyan: #22d3ee;
            --bg-dark: #08080f;
            --glass-bg: rgba(16, 16, 36, 0.78);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-hover: rgba(139, 92, 246, 0.15);
            --text-primary: #f0f0ff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --text-muted: rgba(255, 255, 255, 0.2);
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
            --shadow-premium: 0 40px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            --shadow-glow: 0 0 60px rgba(139, 92, 246, 0.08);
            --transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --control-bar-height: 64px;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 8px;
            min-height: 100dvh;
            background-image:
                radial-gradient(ellipse at 15% 20%, rgba(120, 80, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 80%, rgba(0, 200, 255, 0.08) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 100%, rgba(180, 60, 255, 0.06) 0%, transparent 40%);
            background-attachment: fixed;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0.35;
        }

        /* ============================================================
           APP WRAPPER – scrollable glass panel
           ============================================================ */
        .app-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            width: 100%;
            max-height: 98dvh;
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border-radius: var(--radius-xl);
            padding: 16px 18px 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-premium);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .app-wrapper::-webkit-scrollbar {
            width: 4px;
        }
        .app-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }
        .app-wrapper::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.15);
            border-radius: 10px;
        }

        /* ============================================================
           TOP NAV – logo, search, gallery, load
           ============================================================ */
        .top-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #fff;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.2);
            transition: var(--transition);
            flex-shrink: 0;
        }
        .logo-icon:hover {
            transform: scale(1.05) rotate(-5deg);
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.35);
        }
        .logo-text {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f0f0ff 30%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }
        .logo-text .emoji {
            -webkit-text-fill-color: initial;
            background: none;
        }

        .search-group {
            flex: 1;
            min-width: 140px;
            max-width: 480px;
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 0 3px 0 14px;
            transition: var(--transition);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        .search-group:focus-within {
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.06), inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        .search-group .search-icon {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .search-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 9px 8px;
            color: var(--text-primary);
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            min-width: 50px;
            width: 100%;
        }
        .search-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 400;
        }
        .search-group .btn-gallery {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .search-group .btn-gallery:hover {
            background: rgba(139, 92, 246, 0.08);
            border-color: rgba(139, 92, 246, 0.15);
            color: var(--primary-light);
            transform: scale(1.05);
        }
        .search-group .btn-load {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 60px;
            padding: 7px 16px;
            color: #fff;
            font-weight: 600;
            font-size: 0.72rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 16px rgba(109, 40, 217, 0.2);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .search-group .btn-load:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 24px rgba(109, 40, 217, 0.35);
        }
        .search-group .btn-load:active {
            transform: scale(0.95);
        }

        /* ============================================================
           QUICK ACTIONS – horizontal row
           ============================================================ */
        .quick-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            flex-shrink: 0;
            padding: 2px 0;
        }
        .quick-actions .q-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .quick-actions .q-btn:hover {
            background: rgba(139, 92, 246, 0.06);
            border-color: rgba(139, 92, 246, 0.08);
            color: var(--primary-light);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.04);
        }
        .quick-actions .q-btn.active {
            color: var(--primary-light);
            background: rgba(139, 92, 246, 0.08);
            border-color: rgba(139, 92, 246, 0.1);
        }
        .quick-actions .q-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 14px;
            height: 14px;
            background: #ef4444;
            border-radius: 50%;
            font-size: 0.45rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            border: 2px solid var(--bg-dark);
        }

        /* ============================================================
           MAIN GRID – player + sidebar
           ============================================================ */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 240px;
            gap: 14px;
            flex: 1;
            min-height: 0;
        }

        /* ============================================================
           PLAYER CARD – full-width, responsive 16:9
           ============================================================ */
        .player-card {
            background: rgba(8, 8, 20, 0.5);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            position: relative;
        }
        .player-card:hover {
            border-color: rgba(139, 92, 246, 0.06);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #08080f;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            min-height: 180px;
        }
        .video-wrapper video,
        .video-wrapper iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            background: #08080f;
            object-fit: contain;
        }

        .video-wrapper .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.06);
            background: radial-gradient(ellipse at center, rgba(139, 92, 246, 0.04), transparent 70%);
        }
        .video-wrapper .placeholder i {
            font-size: 3.5rem;
            margin-bottom: 12px;
            color: rgba(139, 92, 246, 0.1);
        }
        .video-wrapper .placeholder span {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.08);
        }

        /* Audio overlay – premium music player style */
        .audio-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a1a, #141428);
            flex-direction: column;
            color: var(--text-primary);
            z-index: 5;
            padding: 20px;
        }
        .audio-overlay.active {
            display: flex;
        }
        .audio-overlay .album-art {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(0, 200, 255, 0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 14px;
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }
        .audio-overlay .album-art img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
        }
        .audio-overlay .audio-title {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 0 10px;
            margin-bottom: 4px;
        }
        .audio-overlay .audio-subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.15);
            margin-bottom: 12px;
        }
        .audio-overlay .audio-progress {
            width: 80%;
            max-width: 400px;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            position: relative;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .audio-overlay .audio-progress .audio-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 8px;
            transition: width 0.1s linear;
        }
        .audio-overlay .audio-time {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.65rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.2px;
            margin-bottom: 10px;
        }
        .audio-overlay .audio-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .audio-overlay .audio-controls .ctrl-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .audio-overlay .audio-controls .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border-color: rgba(139, 92, 246, 0.08);
        }
        .audio-overlay .audio-controls .ctrl-btn.play-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 20px rgba(109, 40, 217, 0.2);
        }
        .audio-overlay .audio-controls .ctrl-btn.play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(109, 40, 217, 0.35);
        }

        .audio-mode .video-wrapper video,
        .audio-mode .video-wrapper iframe {
            visibility: hidden;
        }
        .audio-mode .audio-overlay {
            display: flex;
        }

        /* ============================================================
           PREMIUM CONTROL BAR – always visible in portrait
           ============================================================ */
        .control-bar {
            background: rgba(8, 8, 20, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 14px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-bar.hidden {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* In fullscreen, we use the overlay version */
        .app-wrapper:fullscreen .control-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 0;
            padding: 14px 24px 18px;
        }

        .control-bar .top-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .seek-container {
            flex: 1;
            position: relative;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            cursor: pointer;
            transition: height 0.2s;
            min-height: 4px;
        }
        .seek-container:hover {
            height: 6px;
        }
        .seek-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 8px;
            position: relative;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
            transition: width 0.05s linear;
        }
        .seek-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: -3px;
            width: 12px;
            height: 12px;
            background: var(--primary-light);
            border-radius: 50%;
            opacity: 0;
            transition: var(--transition);
            box-shadow: 0 0 20px var(--primary);
        }
        .seek-container:hover .seek-fill::after {
            opacity: 1;
        }

        .seek-tooltip {
            position: absolute;
            bottom: 20px;
            transform: translateX(-50%);
            background: rgba(8, 8, 20, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 4px 8px;
            color: var(--text-secondary);
            font-size: 0.65rem;
            font-weight: 500;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        .seek-tooltip.visible {
            opacity: 1;
        }
        .seek-tooltip .time-label {
            text-align: center;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .time-display {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.65rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            min-width: 65px;
            text-align: right;
            letter-spacing: 0.2px;
            flex-shrink: 0;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 3px;
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 3px;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border-color: rgba(139, 92, 246, 0.08);
        }
        .ctrl-btn.active-btn {
            color: var(--primary-light);
            background: rgba(139, 92, 246, 0.08);
            border-color: rgba(139, 92, 246, 0.1);
        }
        .ctrl-btn.play-btn {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 20px rgba(109, 40, 217, 0.2);
        }
        .ctrl-btn.play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 28px rgba(109, 40, 217, 0.35);
        }
        .ctrl-btn.sm {
            width: 26px;
            height: 26px;
            font-size: 0.65rem;
        }

        .controls-right {
            display: flex;
            align-items: center;
            gap: 3px;
            flex-wrap: wrap;
        }

        .vol-wrap {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .vol-wrap i {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .vol-wrap i:hover {
            color: var(--primary-light);
        }
        .vol-slider {
            width: 40px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            outline: none;
            transition: width 0.2s;
        }
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: 2px solid #0a0a18;
        }
        .vol-slider::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: 2px solid #0a0a18;
        }

        .speed-selector {
            position: relative;
            display: inline-block;
        }
        .speed-selector .speed-display {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .speed-selector .speed-display:hover {
            background: rgba(139, 92, 246, 0.06);
            border-color: rgba(139, 92, 246, 0.08);
            color: var(--primary-light);
        }
        .speed-selector .speed-dropdown {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 16, 36, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 6px;
            display: none;
            min-width: 100px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            z-index: 20;
        }
        .speed-selector .speed-dropdown.open {
            display: block;
        }
        .speed-selector .speed-dropdown .speed-option {
            padding: 4px 12px;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            font-family: 'Inter', sans-serif;
        }
        .speed-selector .speed-dropdown .speed-option:hover {
            background: rgba(139, 92, 246, 0.06);
            color: var(--primary-light);
        }
        .speed-selector .speed-dropdown .speed-option.active {
            background: rgba(139, 92, 246, 0.08);
            color: var(--primary-light);
        }

        .settings-menu {
            position: absolute;
            bottom: 110%;
            right: 0;
            background: rgba(16, 16, 36, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 10px 12px;
            display: none;
            min-width: 190px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            z-index: 20;
        }
        .settings-menu.open {
            display: block;
        }
        .settings-menu .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 4px;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            gap: 10px;
        }
        .settings-menu .setting-item:hover {
            background: rgba(139, 92, 246, 0.04);
            color: var(--text-primary);
        }
        .settings-menu .setting-item .label {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .settings-menu .setting-item .value {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 400;
            font-size: 0.65rem;
        }
        .settings-menu .setting-item .toggle-small {
            width: 28px;
            height: 16px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .settings-menu .setting-item .toggle-small.active {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.1);
        }
        .settings-menu .setting-item .toggle-small .knob {
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: var(--transition);
        }
        .settings-menu .setting-item .toggle-small.active .knob {
            left: 14px;
            background: var(--primary);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        }

        /* ============================================================
           SIDEBAR – premium glass cards
           ============================================================ */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }

        .sidebar-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            transition: var(--transition);
        }
        .sidebar-card:hover {
            border-color: rgba(139, 92, 246, 0.05);
        }
        .sidebar-card .card-title {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: rgba(255, 255, 255, 0.15);
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-card .card-title i {
            font-size: 0.65rem;
            color: var(--primary-light);
        }

        .speed-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }
        .speed-btn {
            padding: 5px 2px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            background: rgba(255, 255, 255, 0.01);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.55rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }
        .speed-btn:hover {
            background: rgba(139, 92, 246, 0.04);
            border-color: rgba(139, 92, 246, 0.06);
            color: rgba(255, 255, 255, 0.5);
        }
        .speed-btn.active {
            background: rgba(139, 92, 246, 0.08);
            border-color: rgba(139, 92, 246, 0.08);
            color: var(--primary-light);
        }

        .audio-toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .audio-toggle-row .label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toggle-switch {
            width: 38px;
            height: 22px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .toggle-switch.active {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.1);
        }
        .toggle-switch .toggle-knob {
            width: 15px;
            height: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            position: absolute;
            top: 2.5px;
            left: 2.5px;
            transition: var(--transition);
        }
        .toggle-switch.active .toggle-knob {
            left: 19px;
            background: var(--primary);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 150px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .history-list::-webkit-scrollbar {
            width: 2px;
        }
        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.1);
            border-radius: 10px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 6px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.01);
            transition: var(--transition);
            cursor: pointer;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .history-item .thumb {
            width: 32px;
            height: 20px;
            border-radius: 6px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.06), rgba(0, 200, 255, 0.02));
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.45rem;
            color: rgba(255, 255, 255, 0.05);
        }
        .history-item .info {
            flex: 1;
            min-width: 0;
        }
        .history-item .info .title {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.6rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item .info .duration {
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.45rem;
            font-weight: 400;
        }
        .history-item .play-icon {
            color: rgba(255, 255, 255, 0.04);
            font-size: 0.55rem;
        }

        /* ============================================================
           BOTTOM NAV
           ============================================================ */
        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
            padding: 10px 0 2px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            margin-top: 4px;
            flex-shrink: 0;
        }
        .nav-btn {
            padding: 5px 14px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.65rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .nav-btn i {
            font-size: 0.75rem;
        }
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.4);
            border-color: rgba(139, 92, 246, 0.04);
            transform: translateY(-2px);
        }
        .nav-btn.active {
            background: rgba(139, 92, 246, 0.06);
            border-color: rgba(139, 92, 246, 0.06);
            color: var(--primary-light);
        }

        /* ============================================================
           TOAST NOTIFICATIONS
           ============================================================ */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            max-width: 90vw;
        }
        .toast {
            padding: 8px 20px;
            border-radius: 60px;
            background: rgba(16, 16, 36, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 500;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: center;
        }
        .toast i {
            color: var(--primary-light);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .toast-out {
            animation: toastOut 0.3s ease forwards;
        }
        @keyframes toastOut {
            to {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
        }

        /* ============================================================
           FULLSCREEN OVERRIDES
           ============================================================ */
        .app-wrapper:fullscreen {
            max-height: 100vh;
            border-radius: 0;
            padding: 0;
            background: #000;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .app-wrapper:fullscreen .top-nav,
        .app-wrapper:fullscreen .quick-actions,
        .app-wrapper:fullscreen .sidebar,
        .app-wrapper:fullscreen .bottom-nav {
            display: none !important;
        }
        .app-wrapper:fullscreen .main-grid {
            grid-template-columns: 1fr;
            width: 100%;
            height: 100%;
            gap: 0;
        }
        .app-wrapper:fullscreen .player-card {
            border-radius: 0;
            height: 100%;
            width: 100%;
            background: #000;
            border: none;
            box-shadow: none;
        }
        .app-wrapper:fullscreen .video-wrapper {
            aspect-ratio: auto;
            height: 100%;
            width: 100%;
        }
        .app-wrapper:fullscreen .video-wrapper video,
        .app-wrapper:fullscreen .video-wrapper iframe {
            object-fit: contain;
        }
        .app-wrapper:fullscreen .control-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 0;
            padding: 16px 24px 20px;
        }
        .app-wrapper:fullscreen .control-bar .ctrl-btn {
            width: 36px;
            height: 36px;
            font-size: 0.9rem;
        }
        .app-wrapper:fullscreen .control-bar .ctrl-btn.play-btn {
            width: 44px;
            height: 44px;
        }
        .app-wrapper:fullscreen .control-bar .ctrl-btn.sm {
            width: 30px;
            height: 30px;
            font-size: 0.7rem;
        }
        .app-wrapper:fullscreen .control-bar .vol-slider {
            width: 60px;
        }
        .app-wrapper:fullscreen .control-bar .time-display {
            min-width: 90px;
            font-size: 0.75rem;
        }

        /* ============================================================
           RESPONSIVE – mobile portrait first
           ============================================================ */

        /* Tablets & small desktops */
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .sidebar {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 8px;
            }
            .sidebar-card:last-child {
                grid-column: 1 / -1;
            }
        }

        /* Mobile portrait (primary) – ALL CONTROLS VISIBLE */
        @media (max-width: 768px) {
            body {
                padding: 4px;
                align-items: flex-start;
            }
            .app-wrapper {
                padding: 10px 10px 14px;
                border-radius: var(--radius-lg);
                max-height: 98dvh;
                min-height: 94dvh;
            }

            .top-nav {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
                margin-bottom: 8px;
            }
            .logo-area {
                justify-content: center;
            }
            .logo-text {
                font-size: 0.95rem;
            }
            .logo-icon {
                width: 32px;
                height: 32px;
                font-size: 0.95rem;
            }

            .search-group {
                max-width: 100%;
                min-width: 0;
            }
            .search-group input {
                font-size: 0.72rem;
                padding: 8px 6px;
            }
            .search-group .btn-load {
                font-size: 0.65rem;
                padding: 6px 12px;
            }
            .search-group .btn-gallery {
                width: 30px;
                height: 30px;
                font-size: 0.75rem;
            }

            .quick-actions {
                justify-content: center;
                gap: 3px;
                margin-bottom: 8px;
            }
            .quick-actions .q-btn {
                width: 30px;
                height: 30px;
                font-size: 0.7rem;
            }

            .main-grid {
                gap: 8px;
                flex: 1;
                min-height: 0;
            }

            .player-card {
                min-height: 0;
                height: auto;
                flex: 1;
            }
            .video-wrapper {
                aspect-ratio: 16 / 9;
                min-height: 150px;
                flex-shrink: 0;
            }
            .video-wrapper .placeholder i {
                font-size: 2.5rem;
            }
            .video-wrapper .placeholder span {
                font-size: 0.7rem;
            }

            /* Control bar – fully visible, compact */
            .control-bar {
                padding: 8px 10px 10px;
            }
            .control-bar .top-row {
                gap: 6px;
                margin-bottom: 4px;
            }
            .seek-container {
                height: 3px;
            }
            .seek-container:hover {
                height: 5px;
            }

            .ctrl-btn {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }
            .ctrl-btn.play-btn {
                width: 34px;
                height: 34px;
            }
            .ctrl-btn.sm {
                width: 22px;
                height: 22px;
                font-size: 0.55rem;
            }
            .vol-slider {
                width: 32px;
            }
            .time-display {
                font-size: 0.55rem;
                min-width: 55px;
            }
            .speed-selector .speed-display {
                font-size: 0.55rem;
                padding: 1px 6px;
            }
            .speed-selector .speed-dropdown {
                min-width: 80px;
            }
            .speed-selector .speed-dropdown .speed-option {
                font-size: 0.6rem;
                padding: 3px 10px;
            }

            .sidebar {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .sidebar-card {
                padding: 8px 10px;
            }
            .sidebar-card .card-title {
                font-size: 0.45rem;
                margin-bottom: 5px;
            }
            .speed-grid {
                gap: 2px;
            }
            .speed-btn {
                font-size: 0.45rem;
                padding: 3px 1px;
            }
            .audio-toggle-row .label {
                font-size: 0.6rem;
            }
            .toggle-switch {
                width: 34px;
                height: 18px;
            }
            .toggle-switch .toggle-knob {
                width: 12px;
                height: 12px;
                top: 2px;
                left: 2px;
            }
            .toggle-switch.active .toggle-knob {
                left: 18px;
            }
            .history-item .info .title {
                font-size: 0.5rem;
            }
            .history-item .thumb {
                width: 26px;
                height: 16px;
            }
            .history-list {
                max-height: 100px;
            }

            .bottom-nav {
                gap: 2px;
                padding: 6px 0 2px;
                overflow-x: auto;
                flex-wrap: nowrap;
                justify-content: flex-start;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            .bottom-nav::-webkit-scrollbar {
                display: none;
            }
            .nav-btn {
                padding: 3px 8px;
                font-size: 0.55rem;
                flex-shrink: 0;
            }
            .nav-btn i {
                font-size: 0.6rem;
            }

            .toast {
                font-size: 0.65rem;
                padding: 6px 14px;
            }

            .settings-menu {
                min-width: 160px;
                right: -5px;
            }
            .settings-menu .setting-item {
                font-size: 0.6rem;
                padding: 4px 4px;
            }
        }

        /* Very small phones */
        @media (max-width: 420px) {
            .app-wrapper {
                padding: 6px 6px 10px;
                border-radius: var(--radius-md);
                min-height: 96dvh;
            }
            .logo-text {
                font-size: 0.8rem;
            }
            .logo-icon {
                width: 26px;
                height: 26px;
                font-size: 0.8rem;
            }
            .search-group {
                padding: 0 3px 0 10px;
            }
            .search-group input {
                font-size: 0.65rem;
                padding: 6px 4px;
            }
            .search-group .btn-load {
                font-size: 0.55rem;
                padding: 4px 8px;
            }
            .search-group .btn-gallery {
                width: 26px;
                height: 26px;
                font-size: 0.65rem;
            }
            .quick-actions .q-btn {
                width: 24px;
                height: 24px;
                font-size: 0.6rem;
            }

                min-height: 110px;
            }
            .ctrl-btn {
                width: 22px;
                height: 22px;
                font-size: 0.6rem;
            }
            .ctrl-btn.play-btn {
                width: 28px;
                height: 28px;
            }
            .ctrl-btn.sm {
                width: 18px;
                height: 18px;

                width: 24px;
            }
            .time-display {
                font-size: 0.45rem;

            .speed-selector .speed-display {

                padding: 4px 12px;
            }

                height: 80px;

            }
            .audio-overlay .audio-title {
                font-size: 0.8rem;
            }
            .audio-overlay .audio-controls .ctrl-btn {

                height: 28px;

        @supports (padding: max(0px)) {
            .app-wrapper {
                padding-top: max(10px, var(--safe-top));
                padding-bottom: max(14px, var(--safe-bottom));

            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- Particle Canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== APP WRAPPER ===== -->
    <div class="app-wrapper" id="appWrapper">

        <!-- ===== TOP NAV ===== -->
        <nav class="top-nav">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <div class="logo-text">Raftar se<span class="emoji">😎</span></div>
            </div>

            <div class="search-group">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="urlInput" placeholder="Paste YouTube URL or search..." />
                <button class="btn-gallery" id="galleryBtn" title="Choose from Gallery"><i class="fas fa-folder-open"></i></button>
                <button class="btn-load" id="loadBtn"><i class="fas fa-play" style="margin-right:4px;"></i> Load</button>
                <input type="file" id="fileInput" accept="video/*" style="display:none" multiple />
            </div>
        </nav>

        <!-- ===== QUICK ACTIONS ===== -->
        <div class="quick-actions">
            <button class="q-btn" id="libraryBtn" title="Library"><i class="fas fa-folder"></i></button>
            <button class="q-btn" id="themeBtn" title="Theme"><i class="fas fa-palette"></i></button>
            <button class="q-btn" id="settingsBtn" title="Settings"><i class="fas fa-sliders-h"></i></button>
            <button class="q-btn" id="fullscreenBtn" title="Fullscreen"><i class="fas fa-expand"></i></button>
            <button class="q-btn" id="pipBtn" title="Picture-in-Picture"><i class="fas fa-window-restore"></i></button>
            <button class="q-btn" id="historyBtn" title="History"><i class="fas fa-clock"></i></button>
            <button class="q-btn" id="favoritesBtn" title="Favorites"><i class="fas fa-star"></i></button>
            <button class="q-btn" id="playlistBtn" title="Playlist"><i class="fas fa-list"></i></button>
        </div>

        <!-- ===== MAIN GRID ===== -->
        <div class="main-grid">

            <!-- ===== PLAYER CARD ===== -->
            <section class="player-card" id="playerCard">

                <div class="video-wrapper" id="videoWrapper">
                    <div class="placeholder" id="placeholder">
                        <i class="fas fa-play-circle"></i>
                        <span>Ready to play</span>
                    </div>
                    <!-- Audio overlay – premium music player -->
                    <div class="audio-overlay" id="audioOverlay">
                        <div class="album-art" id="albumArt"><i class="fas fa-music"></i></div>
                        <div class="audio-title" id="audioTitle">Audio Mode</div>
                        <div class="audio-subtitle" id="audioSubtitle">Playing in background</div>
                        <div class="audio-progress" id="audioProgress">
                            <div class="audio-progress-fill" id="audioProgressFill"></div>
                        </div>
                        <div class="audio-time" id="audioTime">0:00 / 0:00</div>
                        <div class="audio-controls">

                    <!-- ===== CONTROL BAR ===== -->
                    <div class="control-bar" id="controlBar">

                        <!-- Top row: seek bar + time -->
                        <div class="top-row">

                        <!-- Bottom row: all controls -->
                        <div class="controls-row">

                                <div class="speed-selector" id="speedSelector">
                                    <span class="speed-display" id="speedDisplay">1.0x <i class="fas fa-chevron-down" style="font-size:0.45rem;margin-left:2px;"></i></span>
                                    <div class="speed-dropdown" id="speedDropdown">
                                        <div class="speed-option" data-speed="0.25">0.25x</div>
                                        <div class="speed-option" data-speed="0.5">0.5x</div>
                                        <div class="speed-option" data-speed="0.75">0.75x</div>
                                        <div class="speed-option active" data-speed="1">1.0x</div>
                                        <div class="speed-option" data-speed="1.25">1.25x</div>
                                        <div class="speed-option" data-speed="1.5">1.5x</div>
                                        <div class="speed-option" data-speed="2">2.0x</div>
                                        <div class="speed-option" data-speed="3">3.0x</div>
                                        <div class="speed-option" data-speed="4">4.0x</div>
                                        <div class="speed-option" data-speed="5">5.0x</div>
                                        <div class="speed-option" data-speed="6">6.0x</div>
                                        <div class="speed-option" data-speed="8">8.0x</div>
                                        <div class="speed-option" data-speed="10">10.0x</div>

                                <button class="ctrl-btn sm" id="audioModeBtn" title="Audio Mode"><i class="fas fa-headphones"></i></button>

                                        <span class="label"><i class="fas fa-closed-captioning"></i> Captions</span>
                                        <span class="value" id="captionsValue">Off</span>

                                    <div class="setting-item" data-setting="theme">

                                        <span class="value" id="themeValue">Dark</span>

            <!-- ===== SIDEBAR ===== -->
            <aside class="sidebar">

                        <button class="speed-btn" data-speed="0.5">0.5x</button>
                        <button class="speed-btn" data-speed="0.75">0.75x</button>
                        <button class="speed-btn active" data-speed="1">1x</button>
                        <button class="speed-btn" data-speed="1.25">1.25x</button>
                        <button class="speed-btn" data-speed="1.5">1.5x</button>
                        <button class="speed-btn" data-speed="2">2x</button>
                        <button class="speed-btn" data-speed="3">3x</button>
                        <button class="speed-btn" data-speed="4">4x</button>
                        <button class="speed-btn" data-speed="5">5x</button>
                        <button class="speed-btn" data-speed="6">6x</button>
                        <button class="speed-btn" data-speed="8">8x</button>
                        <button class="speed-btn" data-speed="10" style="grid-column:span 3;">10x</button>
                    </div>

                <div class="sidebar-card">
                    <div class="card-title"><i class="fas fa-headphones"></i> Audio Mode</div>
                    <div class="audio-toggle-row">
                        <span class="label"><i class="fas fa-music"></i> Play audio only</span>
                        <div class="toggle-switch" id="audioToggle">
                            <div class="toggle-knob"></div>
                        </div>
                    </div>
                </div>

                <div class="sidebar-card" style="flex:1;">
                    <div class="card-title"><i class="fas fa-clock"></i> Recent History</div>
                    <div class="history-list" id="historyList">
                        <div style="text-align:center;color:rgba(255,255,255,0.06);font-size:0.6rem;padding:14px 0;">No history yet</div>
                    </div>
