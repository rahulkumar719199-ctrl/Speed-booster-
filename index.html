<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Raftar se😎 · Premium Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        /* ============================================================
           RESET & GLOBAL – premium dark theme, mobile-first
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #6d28d9;
            --primary-light: #c4b5fd;
            --primary-glow: rgba(139, 92, 246, 0.3);
            --accent-blue: #60a5fa;
            --accent-cyan: #22d3ee;
            --bg-dark: #08080f;
            --glass-bg: rgba(16, 16, 36, 0.78);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-hover: rgba(139, 92, 246, 0.15);
            --text-primary: #f0f0ff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --text-muted: rgba(255, 255, 255, 0.2);
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
            --shadow-premium: 0 40px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            --shadow-glow: 0 0 60px rgba(139, 92, 246, 0.08);
            --transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --control-bar-height: 64px;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 8px;
            min-height: 100dvh;
            background-image:
                radial-gradient(ellipse at 15% 20%, rgba(120, 80, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 80%, rgba(0, 200, 255, 0.08) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 100%, rgba(180, 60, 255, 0.06) 0%, transparent 40%);
            background-attachment: fixed;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0.35;
        }

        /* ============================================================
           APP WRAPPER – scrollable glass panel
           ============================================================ */
        .app-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            width: 100%;
            max-height: 98dvh;
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border-radius: var(--radius-xl);
            padding: 16px 18px 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-premium);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .app-wrapper::-webkit-scrollbar {
            width: 4px;
        }
        .app-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }
        .app-wrapper::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.15);
            border-radius: 10px;
        }

        /* ============================================================
           TOP NAV – logo, search, gallery, load
           ============================================================ */
        .top-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #fff;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.2);
            transition: var(--transition);
            flex-shrink: 0;
        }
        .logo-icon:hover {
            transform: scale(1.05) rotate(-5deg);
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.35);
        }
        .logo-text {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f0f0ff 30%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }
        .logo-text .emoji {
            -webkit-text-fill-color: initial;
            background: none;
        }

        .search-group {
            flex: 1;
            min-width: 140px;
            max-width: 480px;
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 0 3px 0 14px;
            transition: var(--transition);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        .search-group:focus-within {
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.06), inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        .search-group .search-icon {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .search-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 9px 8px;
            color: var(--text-primary);
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            min-width: 50px;
            width: 100%;
        }
        .search-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 400;
        }
        .search-group .btn-gallery {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .search-group .btn-gallery:hover {
            background: rgba(139, 92, 246, 0.08);
            border-color: rgba(139, 92, 246, 0.15);
            color: var(--primary-light);
            transform: scale(1.05);
        }
        .search-group .btn-load {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 60px;
            padding: 7px 16px;
            color: #fff;
            font-weight: 600;
            font-size: 0.72rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 16px rgba(109, 40, 217, 0.2);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .search-group .btn-load:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 24px rgba(109, 40, 217, 0.35);
        }
        .search-group .btn-load:active {
            transform: scale(0.95);
        }

        /* ============================================================
           QUICK ACTIONS – horizontal row
           ============================================================ */
        .quick-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            flex-shrink: 0;
            padding: 2px 0;
        }
        .quick-actions .q-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .quick-actions .q-btn:hover {
            background: rgba(139, 92, 246, 0.06);
            border-color: rgba(139, 92, 246, 0.08);
            color: var(--primary-light);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.04);
        }
        .quick-actions .q-btn.active {
            color: var(--primary-light);
            background: rgba(139, 92, 246, 0.08);
            border-color: rgba(139, 92, 246, 0.1);
        }
        .quick-actions .q-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 14px;
            height: 14px;
            background: #ef4444;
            border-radius: 50%;
            font-size: 0.45rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            border: 2px solid var(--bg-dark);
        }

        /* ============================================================
           MAIN GRID – player + sidebar
           ============================================================ */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 240px;
            gap: 14px;
            flex: 1;
            min-height: 0;
        }

        /* ============================================================
           PLAYER CARD – full-width, responsive 16:9
           ============================================================ */
        .player-card {
            background: rgba(8, 8, 20, 0.5);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            position: relative;
        }
        .player-card:hover {
            border-color: rgba(139, 92, 246, 0.06);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #08080f;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            min-height: 180px;
        }
        .video-wrapper video,
        .video-wrapper iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            background: #08080f;
            object-fit: contain;
        }

        .video-wrapper .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.06);
            background: radial-gradient(ellipse at center, rgba(139, 92, 246, 0.04), transparent 70%);
        }
        .video-wrapper .placeholder i {
            font-size: 3.5rem;
            margin-bottom: 12px;
            color: rgba(139, 92, 246, 0.1);
        }
        .video-wrapper .placeholder span {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.08);
        }

        /* Audio overlay – premium music player style */
        .audio-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a1a, #141428);
            flex-direction: column;
            color: var(--text-primary);
            z-index: 5;
            padding: 20px;
        }
        .audio-overlay.active {
            display: flex;
        }
        .audio-overlay .album-art {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(0, 200, 255, 0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 14px;
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }
        .audio-overlay .album-art img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
        }
        .audio-overlay .audio-title {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 0 10px;
            margin-bottom: 4px;
        }
        .audio-overlay .audio-subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.15);
            margin-bottom: 12px;
        }
        .audio-overlay .audio-progress {
            width: 80%;
            max-width: 400px;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            position: relative;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .audio-overlay .audio-progress .audio-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 8px;
            transition: width 0.1s linear;
        }
        .audio-overlay .audio-time {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.65rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.2px;
            margin-bottom: 10px;
        }
        .audio-overlay .audio-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .audio-overlay .audio-controls .ctrl-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .audio-overlay .audio-controls .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border-color: rgba(139, 92, 246, 0.08);
        }
        .audio-overlay .audio-controls .ctrl-btn.play-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 20px rgba(109, 40, 217, 0.2);
        }
        .audio-overlay .audio-controls .ctrl-btn.play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(109, 40, 217, 0.35);
        }

        .audio-mode .video-wrapper video,
        .audio-mode .video-wrapper iframe {
            visibility: hidden;
        }
        .audio-mode .audio-overlay {
            display: flex;
        }

        /* ============================================================
           PREMIUM CONTROL BAR – always visible in portrait
           ============================================================ */
        .control-bar {
            background: rgba(8, 8, 20, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 14px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-bar.hidden {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* In fullscreen, we use the overlay version */
        .app-wrapper:fullscreen .control-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 0;
            padding: 14px 24px 18px;
        }

        .control-bar .top-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .seek-container {
            flex: 1;
            position: relative;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            cursor: pointer;
            transition: height 0.2s;
            min-height: 4px;
        }
        .seek-container:hover {
            height: 6px;
        }
        .seek-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 8px;
            position: relative;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
            transition: width 0.05s linear;
        }
        .seek-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: -3px;
            width: 12px;
            height: 12px;
            background: var(--primary-light);
            border-radius: 50%;
            opacity: 0;
            transition: var(--transition);
            box-shadow: 0 0 20px var(--primary);
        }
        .seek-container:hover .seek-fill::after {
            opacity: 1;
        }

        .seek-tooltip {
            position: absolute;
            bottom: 20px;
            transform: translateX(-50%);
            background: rgba(8, 8, 20, 0.92);
            backdrop-filter:
